<!DOCTYPE html>
<html>
<head>
  <title>Student Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Register Student</h2>
  <form action="register_student.php" method="post">
    <input type="text" name="name" placeholder="Student Name" required><br>
    <input type="number" name="age" placeholder="Age" required><br>
    <input type="text" name="contact" placeholder="Contact" required><br>
    <input type="text" name="room_no" placeholder="Room No" required><br>
    <input type="number" step="0.01" name="fees_paid" placeholder="Fees Paid" required><br>
    <input type="submit" value="Register">
  </form>
</body>
</html>
